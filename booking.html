<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="icon" href="imegs/icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="booking-header">
        <h1><i class="fa-solid fa-tooth"></i>Smilux</h1>
        <h2>Appointment Booking</h2>
        <button class="back-btn" type="button" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
    </header>

    <main class="booking-page">
        <form class="contact-form box" id="contactForm" data-aos="fade-left">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required>
                <small class="error"></small>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <small class="error"></small>
            </div>

            <div class="form-group">
                <input type="text" id="phone" placeholder="Phone Number" required>
                <small class="error"></small>
            </div>

            <div class="form-group">
                <textarea id="message" placeholder="Your Message" required></textarea>
                <small class="error"></small>
            </div>

            <button class="btn btn-primary" type="submit">Send Message</button>

            <p class="success-msg" id="successMsg">Message sent successfully!</p>

        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
